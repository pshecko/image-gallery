@let currentImage = image();
@let selected = isSelected();
@let featured = isFeatured();
@let featureSelected = isFeatureSelected();

<article
  class="image-card relative h-full overflow-hidden rounded border border-gray-300 bg-white"
  [class.featured]="featured"
  [class.selected]="selected"
>
  <input
    [id]="'select-image-' + currentImage.id"
    type="checkbox"
    class="absolute left-5 top-5 z-10 h-5 w-5 rounded border-gray-500 bg-white accent-blue-700 shadow-sm"
    [checked]="selected"
    [attr.aria-label]="'Seleccionar ' + currentImage.title"
    (change)="onCheckboxChange($event)"
  />

  <label class="block cursor-pointer" [attr.for]="'select-image-' + currentImage.id">
    @if (loadsEagerly()) {
      <img
        class="aspect-3/2 w-full rounded-t object-cover"
        [ngSrc]="currentImage.src"
        [alt]="currentImage.alt"
        width="480"
        height="320"
        decoding="async"
        sizes="(min-width: 1024px) 40vw, (min-width: 768px) 25vw, 50vw"
        priority
      />
    } @else {
      <img
        class="aspect-3/2 w-full rounded-t object-cover"
        [ngSrc]="currentImage.src"
        [alt]="currentImage.alt"
        width="480"
        height="320"
        decoding="async"
        sizes="(min-width: 1024px) 40vw, (min-width: 768px) 25vw, 50vw"
        loading="lazy"
        fetchpriority="auto"
      />
    }
  </label>

  <div class="image-card-body p-3">
    <div class="image-card-header flex items-center justify-between gap-1">
      <h2
        class="min-w-0 flex-1 truncate text-base font-semibold"
        [class.text-gray-900]="!featured"
        [class.text-slate-100]="featured"
      >
        {{ currentImage.title }}
      </h2>

      <div class="image-card-actions ml-auto flex shrink-0 gap-1">
        <button
          pButton
          type="button"
          class="gallery-action-button p-1.5"
          severity="secondary"
          size="small"
          [title]="featureSelected ? 'Unfeature' : 'Feature'"
          [attr.aria-label]="(featureSelected ? 'Unfeature ' : 'Feature ') + currentImage.title"
          [attr.aria-pressed]="featureSelected"
          (click)="onFeatureClick($event)"
        >
          <svg
            pButtonIcon
            data-testid="feature-icon"
            class="gallery-action-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
          >
            <use
              [attr.href]="featureSelected ? 'icons/star.svg#star-fill' : 'icons/star.svg#star'"
            />
          </svg>
        </button>

        <button
          pButton
          type="button"
          class="gallery-action-button p-1.5"
          severity="danger"
          size="small"
          title="Eliminar"
          [attr.aria-label]="'Eliminar ' + currentImage.title"
          (click)="onDeleteClick($event)"
        >
          <svg
            pButtonIcon
            data-testid="delete-icon"
            class="gallery-action-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
          >
            <use href="icons/trash.svg#trash" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</article>
