<article
  class="image-card relative h-full rounded border border-gray-300 bg-white p-3"
  [class.featured]="isFeatured()"
  [class.selected]="isSelected()"
>
  <input
    type="checkbox"
    class="absolute left-5 top-5 z-10 h-5 w-5 rounded border-gray-500 bg-white accent-blue-700 shadow-sm"
    [checked]="isSelected()"
    [attr.aria-label]="'Seleccionar ' + image().title"
    (change)="onCheckboxChange($event)"
  />

  <img
    class="mb-3 aspect-3/2 w-full rounded object-cover"
    [src]="image().src"
    [alt]="image().alt"
    width="480"
    height="320"
    decoding="async"
    [attr.loading]="loadsEagerly() ? 'eager' : 'lazy'"
    [attr.fetchpriority]="loadsEagerly() ? 'high' : 'auto'"
    role="button"
    tabindex="0"
    [attr.aria-pressed]="isSelected()"
    [attr.aria-label]="'Alternar seleccion de ' + image().title"
    (click)="onSelectClick($event)"
    (keydown.enter)="onSelectKeydown($event)"
    (keydown.space)="onSelectKeydown($event)"
  />

  <h2
    class="text-base font-semibold"
    [class.text-gray-900]="!isFeatured()"
    [class.text-slate-100]="isFeatured()"
  >
    {{ image().title }}
  </h2>

  <div class="mt-3 flex flex-wrap gap-2">
    <button
      pButton
      type="button"
      [label]="isFeatured() ? 'Unfeature' : 'Feature'"
      severity="secondary"
      size="small"
      [attr.aria-label]="
        (isFeatured() ? 'Unfeature ' : 'Feature ') + image().title
      "
      [attr.aria-pressed]="isFeatured()"
      (click)="onFeatureClick($event)"
    ></button>

    <button
      pButton
      type="button"
      label="Eliminar"
      severity="danger"
      size="small"
      [attr.aria-label]="'Eliminar ' + image().title"
      (click)="onDeleteClick($event)"
    ></button>
  </div>
</article>
