<article
  class="image-card h-full rounded border border-gray-300 bg-white p-3"
  [class.featured]="isFeatured()"
>
  <img
    class="mb-3 aspect-3/2 w-full rounded object-cover"
    [src]="image().src"
    [alt]="image().alt"
  />

  <h2 class="text-base font-semibold text-gray-900">{{ image().title }}</h2>
</article>
