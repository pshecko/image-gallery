<article
  class="image-card relative h-full overflow-hidden rounded border border-gray-300 bg-white"
  [class.featured]="isFeatured()"
  [class.selected]="isSelected()"
>
  <input
    type="checkbox"
    class="absolute left-5 top-5 z-10 h-5 w-5 rounded border-gray-500 bg-white accent-blue-700 shadow-sm"
    [checked]="isSelected()"
    [attr.aria-label]="'Seleccionar ' + image().title"
    (change)="onCheckboxChange($event)"
  />

  <img
    class="aspect-3/2 w-full rounded-t object-cover"
    [src]="image().src"
    [alt]="image().alt"
    width="480"
    height="320"
    decoding="async"
    [attr.loading]="loadsEagerly() ? 'eager' : 'lazy'"
    [attr.fetchpriority]="loadsEagerly() ? 'high' : 'auto'"
    role="button"
    tabindex="0"
    [attr.aria-pressed]="isSelected()"
    [attr.aria-label]="'Alternar seleccion de ' + image().title"
    (click)="onSelectClick($event)"
    (keydown.enter)="onSelectKeydown($event)"
    (keydown.space)="onSelectKeydown($event)"
  />

  <div class="image-card-body p-3">
    <div class="image-card-header flex items-center justify-between gap-1">
      <h2
        class="min-w-0 flex-1 truncate text-sm font-semibold"
        [class.text-gray-900]="!isFeatured()"
        [class.text-slate-100]="isFeatured()"
      >
        {{ image().title }}
      </h2>

      <div class="image-card-actions ml-auto flex shrink-0 gap-1">
        <button
          pButton
          type="button"
          class="gallery-action-button"
          severity="secondary"
          size="small"
          [title]="isFeatured() ? 'Unfeature' : 'Feature'"
          [attr.aria-label]="
            (isFeatured() ? 'Unfeature ' : 'Feature ') + image().title
          "
          [attr.aria-pressed]="isFeatured()"
          (click)="onFeatureClick($event)"
        >
          <svg
            pButtonIcon
            data-testid="feature-icon"
            class="gallery-action-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
          >
            <use
              [attr.href]="
                isFeatured()
                  ? '/icons/star.svg#star-fill'
                  : '/icons/star.svg#star'
              "
            />
          </svg>
        </button>

        <button
          pButton
          type="button"
          class="gallery-action-button"
          severity="danger"
          size="small"
          title="Eliminar"
          [attr.aria-label]="'Eliminar ' + image().title"
          (click)="onDeleteClick($event)"
        >
          <svg
            pButtonIcon
            data-testid="delete-icon"
            class="gallery-action-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
          >
            <use href="/icons/trash.svg#trash" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</article>
