<section class="mx-auto max-w-5xl px-4 py-8" aria-labelledby="gallery-title">
  <header class="mb-6">
    <h1 id="gallery-title" class="text-3xl font-bold text-gray-900">
      Galeria de imagenes
    </h1>
    <p class="mt-2 text-gray-600">
      Galeria de practica con imagenes de marcador de posicion.
    </p>
  </header>

  @if (selectedCount() > 0) {
  <div
    data-testid="selection-toolbar"
    class="mb-4 flex flex-wrap items-center justify-between gap-3 rounded border border-blue-200 bg-blue-50 p-3"
  >
    <p class="font-semibold text-blue-900">{{ selectedCountLabel() }}</p>

    <button
      pButton
      type="button"
      label="Eliminar seleccionadas"
      severity="danger"
      size="small"
      [attr.aria-label]="'Eliminar ' + selectedCountLabel()"
      (click)="deleteSelectedImages()"
    ></button>
  </div>
  }

  <div
    cdkDropList
    cdkDropListOrientation="mixed"
    data-testid="gallery-grid"
    [cdkDropListData]="images()"
    (cdkDropListDropped)="drop($event)"
    class="grid grid-cols-2 gap-4 md:grid-cols-4 lg:grid-cols-5"
  >
    @for (image of images(); track image.id; let first = $first) {
    <app-image-item
      cdkDrag
      class="block cursor-grab active:cursor-grabbing"
      [image]="image"
      [isFeatured]="first"
      [isSelected]="isSelected(image.id)"
      (selectImage)="toggleSelection($event)"
      (deleteImage)="removeImage($event)"
    />
    }
  </div>
</section>
